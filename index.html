<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
  <title>XMLtoPlainText</title>
</head>
<body>
  <div class="px-4 flex text-center flex-col max-w-screen-xl m-auto h-full">
      <h1 class="text-3xl font-bold mb-4 py-3">Xml to Plain Text</h1>
      <input class="my-2" type="file" name="file" id="xmlFile">
      <div class="flex gap-3 h-2/6">
        <textarea placeholder="Escribe tu canción aquí" name="xml receive" id="xmlOrigin" cols="30" rows="10" class="w-full rounded-md"></textarea>
        <div class="relative w-full tooltip">
          <button id="copySong" class="absolute top-2 right-5 rounded-full bg-gray-100 h-10 w-10 p-1 flex justify-center items-center hover:bg-gray-200 hover:transition-all transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z" />
            </svg>          
          </button>
          <textarea readonly name="xml receive" id="xmlDestino" cols="30" rows="10" class="w-full h-full bg-gray-100 rounded-md"></textarea>
        </div>
      </div>
      <button class="mt-2 bg-blue-500 hover:bg-blue-700 py-2 px-6 text-white font'bold' rounded-xl transition-all hover:transition-all" id="convertButton">Convertir</button>
      <span class="tooltiptext" id="myTooltip"></span>
  </div>
</body>
<script src="main.js"></script>
</html>
